<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MiniMe · 找到你的专属分身</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --card: #1e1e2a;
    --border: rgba(255,255,255,0.07);
    --gold: #c8a85a;
    --gold-light: #e8c97a;
    --text: #f0eee8;
    --muted: #888899;
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 40px;
  }

  .screen {
    width: 100%;
    max-width: 420px;
    display: none;
    flex-direction: column;
    align-items: center;
    animation: fadeUp .45s cubic-bezier(.22,.68,0,1.2) both;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── INTRO ── */
  .logo {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .tagline {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 48px;
    line-height: 1.8;
  }
  .tagline strong { color: var(--text); }

  .btn-start {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #c8a85a, #a07a30);
    color: #0e0e14;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .3px;
    transition: opacity .2s, transform .15s;
  }
  .btn-start:active { transform: scale(.97); opacity: .9; }

  .intro-note {
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 420px;
    margin-bottom: 28px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c8a85a, #e8c97a);
    border-radius: 2px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ── QUESTION ── */
  .q-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    align-self: flex-start;
  }
  .q-text {
    font-size: 19px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 28px;
    text-align: left;
    align-self: flex-start;
  }

  .options { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .opt {
    width: 100%;
    padding: 16px 18px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    cursor: pointer;
    text-align: left;
    transition: border-color .2s, background .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .opt:active { transform: scale(.98); }
  .opt:hover { border-color: rgba(200,168,90,.4); }
  .opt.selected {
    border-color: var(--gold);
    background: rgba(200,168,90,.1);
  }
  .opt .opt-tag {
    display: inline-block;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,.07);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    line-height: 22px;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .opt.selected .opt-tag {
    background: var(--gold);
    color: #0e0e14;
  }
  .opt-inner { display: flex; align-items: flex-start; }

  /* 4-option grid for Q6-Q10 */
  .options.grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .options.grid2 .opt {
    padding: 14px 12px;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .opt-emoji { font-size: 22px; }
  .opt-body { display: flex; flex-direction: column; }
  .opt-main { font-size: 13px; font-weight: 600; }
  .opt-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

  /* ── TRANSITION SCREEN ── */
  .trans-text {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .trans-sub {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 40px;
  }

  /* ── LOADING ── */
  .loading-text {
    font-size: 15px;
    color: var(--muted);
    text-align: center;
    margin-top: 24px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: .4; }
    50%       { opacity: 1; }
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(255,255,255,.08);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULT ── */
  .result-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .result-header {
    padding: 28px 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .result-minicode {
    font-size: 11px;
    letter-spacing: 2.5px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
  }
  .result-avatar {
    width: 90px; height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    margin: 4px 0;
    flex-shrink: 0;
  }
  .result-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -.5px;
  }
  .result-mbti-tag {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255,255,255,.07);
    color: var(--muted);
    letter-spacing: 1px;
  }
  .result-quote {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.7;
    text-align: center;
    font-style: italic;
  }
  .result-desc {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
  }
  .result-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }
  .meta-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .meta-chip.accent { border-color: var(--gold); color: var(--gold); }

  .result-element-banner {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }
  .result-element-banner strong { color: var(--text); }

  .btn-share, .btn-retry {
    width: 100%;
    padding: 15px;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    border: none;
  }
  .btn-share:active, .btn-retry:active { transform: scale(.97); }

  .btn-share {
    background: linear-gradient(135deg, #c8a85a, #a07a30);
    color: #0e0e14;
    margin-bottom: 10px;
  }
  .btn-retry {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ── ELEMENT indicator ── */
  .el-wrap {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
    width: 100%;
  }
  .el-item {
    flex: 1;
    padding: 10px 6px;
    border-radius: 10px;
    background: var(--card);
    border: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: var(--muted);
  }
  .el-item .el-emoji { font-size: 18px; }
  .el-item.active { border-color: var(--gold); color: var(--gold-light); }
</style>
</head>
<body>
<div id="app">

  <!-- ① INTRO -->
  <div class="screen active" id="s-intro">
    <div class="logo">MiniMe</div>
    <p class="tagline">
      从一张角色卡开始<br>
      找到<strong>属于你的那一个分身</strong>
    </p>
    <button class="btn-start" onclick="startQuiz()">开始测试 →</button>
    <p class="intro-note">13 道题 · 约 4 分钟</p>
  </div>

  <!-- ② QUIZ -->
  <div class="screen" id="s-quiz">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">第 1 题</span>
        <span id="prog-pct">0%</span>
      </div>

    </div>
    <div style="width:100%;max-width:420px">
      <div class="q-label" id="q-label">MBTI 骨架</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>
  </div>

  <!-- ③ TRANSITION -->
  <div class="screen" id="s-trans">
    <div class="trans-text">好了，我大概知道你是谁了。<br>现在告诉我——</div>
    <div class="trans-sub">你今天怎么样？</div>
    <button class="btn-start" onclick="continueQuiz()">继续 →</button>
  </div>

  <!-- ④ LOADING -->
  <div class="screen" id="s-loading">
    <div class="spinner"></div>
    <p class="loading-text" id="loading-txt">正在为你匹配专属分身……</p>
  </div>

  <!-- ⑤ RESULT -->
  <div class="screen" id="s-result">
    <div class="result-card" id="result-card">
      <div class="result-header">
        <div class="result-minicode" id="res-code"></div>
        <div class="result-avatar" id="res-avatar"></div>
        <div class="result-name" id="res-name"></div>
        <div class="result-mbti-tag" id="res-mbti-tag"></div>
      </div>
      <div class="result-quote" id="res-quote"></div>
      <div class="result-element-banner" id="res-el-banner"></div>
      <div class="result-desc" id="res-desc"></div>
      <div class="result-meta" id="res-meta"></div>
    </div>
    <button class="btn-share" onclick="shareResult()">分享我的分身 ↗</button>
    <button class="btn-retry" onclick="retryQuiz()">重新测试</button>
  </div>

</div>

// ══ ELEMENT MAP ═══════════════════════════════════════════════════════════════

// Q6-Q10: A=fire, B=wind, C=earth, D=water
// Q7 has weight 2
const EL_WEIGHTS = { q9:1, q10:2, q11:1, q12:1, q13:1 };

// ══ STATE ═════════════════════════════════════════════════════════════════════

let currentQ = 0;
let answers = {};
let isElementPhase = false;

// ══ QUIZ LOGIC ════════════════════════════════════════════════════════════════

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  // re-trigger animation
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}

function startQuiz() {
  currentQ = 0;
  answers = {};
  isElementPhase = false;
  renderQuestion();
  show('s-quiz');
}

function retryQuiz() {
  startQuiz();
}

function continueQuiz() {
  isElementPhase = true;
  renderQuestion();
  show('s-quiz');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);

  document.getElementById('prog-label').textContent = `第 ${currentQ + 1} 题 / 共 ${QUESTIONS.length} 题`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-text').textContent = q.text;

  const container = document.getElementById('q-options');
  container.className = 'options' + (q.binary ? '' : ' grid2');

  if (q.binary) {
    container.innerHTML = q.opts.map(o => `
      <button class="opt" onclick="selectAnswer('${q.id}','${o.tag}')">
        <div class="opt-inner">
          <span class="opt-tag">${o.tag}</span>
          <span>${o.text}</span>
        </div>
      </button>`).join('');
  } else {
    container.innerHTML = q.opts.map(o => `
      <button class="opt" onclick="selectAnswer('${q.id}','${o.tag}')">
        <span class="opt-emoji">${o.emoji}</span>
        <div class="opt-body">
          <span class="opt-main">${o.main}</span>
          <span class="opt-sub">${o.sub}</span>
        </div>
      </button>`).join('');
  }
}

function selectAnswer(qid, tag) {
  answers[qid] = tag;

  // highlight
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');

  // advance after short delay
  setTimeout(() => {
    currentQ++;
    if (currentQ === 8) {
      // show transition
      show('s-trans');
    } else if (currentQ >= QUESTIONS.length) {
      showLoading();
    } else {
      renderQuestion();
      // re-animate question block
      const quiz = document.getElementById('s-quiz');
      quiz.style.animation = 'none';
      quiz.offsetHeight;
      quiz.style.animation = 'fadeUp .35s cubic-bezier(.22,.68,0,1.2) both';
    }
  }, 280);
}

// ══ SCORING ═══════════════════════════════════════════════════════════════════

function computeResult() {
  // MBTI
  let E=0, I=0, N=0, S=0, F=0, T=0, J=0, P=0;
  if (answers.q1==='A') E++; else I++;
  if (answers.q2==='A') N++; else S++;
  if (answers.q3==='A') T++; else F++;
  if (answers.q4==='A') J++; else P++;
  if (answers.q5==='A') { E+=.5; F+=.5; } else { I+=.5; T+=.5; }
  if (answers.q6==='A') T++; else F++;
  if (answers.q7==='A') N++; else S++;
  if (answers.q8==='A') J++; else P++;

  const mbti =
    (E>=I?'E':'I') +
    (N>=S?'N':'S') +
    (F>=T?'F':'T') +
    (J>=P?'J':'P');

  // Element
  const scores = { fire:0, wind:0, earth:0, water:0 };
  const tagMap = { A:'fire', B:'wind', C:'earth', D:'water' };
  ['q9','q10','q11','q12','q13'].forEach(qid => {
    const tag = answers[qid];
    if (tag && tagMap[tag]) {
      scores[tagMap[tag]] += EL_WEIGHTS[qid];
    }
  });

  let element = Object.keys(scores).reduce((a,b) => scores[a]>=scores[b]?a:b);

  return { mbti, element };
}

// ══ LOADING + REVEAL ══════════════════════════════════════════════════════════

function showLoading() {
  show('s-loading');
  const msgs = [
    '正在为你匹配专属分身……',
    '正在匹配你的专属分身……',
    '分析你今天的状态……',
  ];
  let i = 0;
  const el = document.getElementById('loading-txt');
  const interval = setInterval(() => {
    i = (i+1) % msgs.length;
    el.textContent = msgs[i];
  }, 900);

  setTimeout(() => {
    clearInterval(interval);
    const result = computeResult();
    renderResult(result);
    show('s-result');
  }, 2200);
}

function renderResult({ mbti, element }) {
  const key = mbti + '-' + element;
  const p = PROFILES[key] || PROFILES[mbti + '-' + defaults[mbti]];
  const defaultEl = p.defaultEl;
  const isCross = element !== defaultEl;
  const miniCode = mbti + ' · ' + EL_EMOJI[element] + EL_NAME[element];

  // Header
  document.getElementById('res-code').textContent = miniCode;
  const avatar = document.getElementById('res-avatar');
  avatar.style.background = p.color + '22';
  avatar.style.border = '2px solid ' + p.color + '55';
  avatar.textContent = p.emoji;
  document.getElementById('res-name').textContent = p.name;
  document.getElementById('res-mbti-tag').textContent = mbti + ' · ' + p.label;

  // Quote
  document.getElementById('res-quote').textContent = '「' + p.quote + '」';

  // Element banner
  const banner = document.getElementById('res-el-banner');
  banner.innerHTML = '<strong>' + EL_EMOJI[element] + ' 你今天的元素：' + EL_NAME[element] + '</strong><br>' + EL_NEED[element];

  // Companion / trigger
  document.getElementById('res-desc').textContent = p.companion;

  // Meta chips
  const meta = document.getElementById('res-meta');
  meta.innerHTML =
    '<span class="meta-chip accent">' + EL_EMOJI[defaultEl] + ' 本源 ' + EL_NAME[defaultEl] + '系</span>' +
    '<span class="meta-chip">' + EL_EMOJI[element] + ' 今日 ' + EL_NAME[element] + '态</span>' +
    '<span class="meta-chip">' + (isCross ? '跨元素状态' : '本源共鸣') + '</span>' +
    '<span class="meta-chip">' + p.attr + '</span>';

  // Card accent color
  document.getElementById('result-card').style.borderColor = p.color + '44';
  document.getElementById('res-name').style.color = p.color;

  // Store for share
  window._lastResult = { mbti, element, name: p.name, quote: p.quote, miniCode, emoji: p.emoji };
}

// ══ SHARE ═════════════════════════════════════════════════════════════════════

function shareResult() {
  const r = window._lastResult;
  if (!r) return;
  const text = `我的 MiniMe 分身是「${r.name}」${r.emoji}\nMiniCode：${r.miniCode}\n\n「${r.quote}」\n\n→ 测一测你的分身：`;
  if (navigator.share) {
    navigator.share({ title: 'MiniMe · 我的专属分身', text }).catch(()=>{});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-share');
      btn.textContent = '已复制，快去分享 ✓';
      setTimeout(() => { btn.textContent = '分享我的分身 ↗'; }, 2000);
    });
  }
}
